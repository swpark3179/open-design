<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qelora — Layered Depth</title>
  <!-- Zimula Trial custom fonts (per template spec) -->
  <link href="https://db.onlinewebfonts.com/c/076f8c5b3b67616658dd1e4e9bac62ec?family=Zimula+Trial+Med" rel="stylesheet">
  <link href="https://db.onlinewebfonts.com/c/08d8ca53f66ab5b48659912fa0136b78?family=Zimula+Trial+Bd" rel="stylesheet">
  <style>
    @import url('https://db.onlinewebfonts.com/c/46024824a3dd3309c3a7f46f4f1283ba?family=Zimula+Trial+Reg');

    :root {
      --bg-dark: #0e0c0a;
      --ink-1: #241f21;
      --ink-2: #282425;
      --ink-3: #2a2420;
      --dark-accent: #100e0c;
      --glass-72: rgba(248, 245, 240, 0.72);
      --glass-88: rgba(248, 245, 240, 0.88);
      --glass-92: rgba(248, 245, 240, 0.92);
      --glass-96: rgba(248, 245, 240, 0.96);
      --warm-12: rgba(235, 230, 218, 0.12);
      --warm-38: rgba(242, 238, 230, 0.38);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Zimula Trial Med', -apple-system, system-ui, sans-serif;
      background: var(--bg-dark);
      overflow-x: hidden;
      color: var(--ink-1);
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    img, video, svg { display: block; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ════════ SECTION 1 — HERO ════════ */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: visible;
      font-family: 'Zimula Trial Med', sans-serif;
    }
    /* Layer 1 — background video */
    .hero__bg {
      position: absolute; inset: 0;
      width: 100%; height: 100vh;
      object-fit: cover;
      z-index: 0;
    }
    /* Layer 2 — warm overlay */
    .hero__overlay {
      position: absolute; inset: 0;
      height: 100vh;
      background: var(--warm-12);
      pointer-events: none;
      z-index: 1;
    }
    /* Layer 3 — bird animation system */
    .birds {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100vh;
      pointer-events: none;
      z-index: 8;
    }
    .birds video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    /* Layer 4 — center brand text */
    .hero__brand {
      position: absolute; inset: 0;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      z-index: 5;
    }
    .hero__brand span {
      font-family: 'Zimula Trial Bd', sans-serif;
      font-size: 22vw;
      letter-spacing: -0.05em;
      color: var(--ink-1);
      line-height: 1;
      margin-bottom: 12vh;
    }
    /* Layer 5 — sculpture / slab */
    .hero__slab {
      position: absolute; top: 50%; left: 50%;
      transform: translateX(-50%) translateY(0px);
      width: 160vw; height: auto;
      pointer-events: none;
      will-change: transform;
      z-index: 5;
    }
    /* Layer 6 — fixed navbar */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 36px;
      z-index: 100;
    }
    .nav__brand {
      font-family: 'Zimula Trial Bd', sans-serif;
      font-size: 24px;
      letter-spacing: -0.03em;
      color: var(--ink-1);
    }
    .nav__brand sup { font-size: 0.4em; vertical-align: super; }
    .nav__pills { display: flex; align-items: center; gap: 8px; }
    .pill {
      position: relative;
      background: var(--glass-92);
      border-radius: 12px;
      padding: 13px 22px 8px;
      height: 40px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-1);
      font-weight: 500;
    }
    .pill.active { font-weight: 700; }
    .pill.active::after {
      content: '';
      position: absolute; bottom: 3px; left: 50%;
      transform: translateX(-50%);
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--ink-1);
    }
    .pill--lang {
      display: flex; align-items: center; gap: 6px;
      border-radius: 100px;
      padding: 8px 14px; height: auto;
      background: var(--glass-88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    .nav__burger {
      display: none;
      width: 42px; height: 42px; border-radius: 100px;
      background: var(--glass-88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      place-items: center; color: var(--ink-1);
    }
    /* Layer 7 — mobile dropdown */
    .mobile-menu {
      display: none;
      position: fixed; top: 70px; left: 16px; right: 16px;
      background: var(--glass-96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 18px; padding: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14);
      z-index: 99;
    }
    .mobile-menu.open { display: block; }
    .mobile-menu button {
      width: 100%; text-align: left;
      padding: 14px 20px; font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--ink-1);
      border-bottom: 1px solid rgba(40,36,37,0.08);
    }
    .mobile-menu button:last-child { border-bottom: none; }
    /* Layer 8 — bottom panels */
    .hero__panels { z-index: 20; }
    .panel-left {
      position: absolute; left: 36px; bottom: 36px;
      max-width: 270px;
      background: var(--glass-72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 22px 28px;
    }
    .panel-left__head {
      font-size: clamp(17px, 2vw, 24px);
      line-height: 1.28; color: var(--ink-2);
      letter-spacing: -0.01em; white-space: pre-line;
    }
    .panel-left__divider {
      height: 1px; background: rgba(40,36,37,0.2);
      margin: 16px 0 12px;
    }
    .panel-left__link {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink-2);
    }
    .panel-right {
      position: absolute; right: 36px; bottom: 36px;
      border-radius: 18px;
      width: clamp(210px, 21vw, 290px);
      height: 180px;
      overflow: hidden;
    }
    .panel-right__bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover;
    }
    .panel-right__grad {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(16,14,12,0.55) 0%, transparent 60%);
    }
    .panel-right__top {
      position: absolute; top: 18px; left: 20px; right: 20px;
      color: #fff; font-size: 13px; line-height: 1.35;
      white-space: pre-line;
    }
    .panel-right__cta {
      position: absolute; bottom: 16px; left: 16px; right: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .cta-circle {
      width: 36px; height: 36px; border-radius: 12px;
      background: #fff; display: grid; place-items: center; color: var(--ink-3);
      flex: 0 0 auto;
    }
    .cta-btn {
      flex: 1; height: 36px; border-radius: 12px;
      background: #fff; color: var(--ink-1);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
      font-weight: 700;
    }

    /* ════════ SECTION 2 ════════ */
    .sec2 {
      position: relative;
      width: 100%; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Zimula Trial Med', sans-serif;
    }
    .sec2__bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    .sec2__overlay {
      position: absolute; inset: 0;
      background: var(--warm-38);
      pointer-events: none; z-index: 1;
    }
    .sec2__headline {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; text-align: center; padding: 0 24px;
      z-index: 2;
    }
    .sec2__headline h2 {
      font-size: clamp(32px, 5.5vw, 80px);
      line-height: 1.18; color: var(--ink-3);
      max-width: 780px; letter-spacing: -0.025em; font-weight: 400;
    }
    .sec2__bottom {
      position: absolute; bottom: clamp(24px, 4vh, 48px);
      left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 24px; z-index: 2;
    }
    .sec2__line { width: 1px; height: 56px; background: rgba(42,36,32,0.25); }
    .sec2__info {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      margin-top: 22px;
    }
    .sec2__info p {
      font-size: clamp(11px, 1.4vw, 13px);
      color: var(--ink-3); letter-spacing: 0.04em; line-height: 1.6;
      max-width: 340px; opacity: 0.75; text-align: center;
    }

    /* ════════ RESPONSIVE 768px ════════ */
    @media (max-width: 767px) {
      .nav { padding: 16px 20px; }
      .nav__brand { font-size: 20px; }
      .nav__pills { display: none; }
      .nav__burger { display: grid; }
      .hero__brand span { font-size: 26vw; margin-bottom: 8vh; }
      .hero__slab { width: 220vw; }
      .birds video {
        top: 50%; left: 0; transform: translateY(-50%);
        width: 100%; height: auto; inset: auto;
      }
      .hero__panels {
        position: absolute; left: 20px; right: 20px; bottom: 24px;
        display: flex; flex-direction: column; gap: 12px;
      }
      .panel-left, .panel-right {
        position: static; left: auto; right: auto; bottom: auto;
        width: 100%; max-width: none;
      }
      .panel-left { border-radius: 16px; padding: 18px 20px; }
      .panel-left__head { font-size: 17px; white-space: normal; }
      .panel-right { border-radius: 16px; height: 120px; }
      .panel-right__top { font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- ════════ NAVBAR (Layer 6) ════════ -->
  <nav class="nav">
    <div class="nav__brand">Qelora<sup>&reg;</sup></div>
    <div class="nav__pills">
      <button class="pill active">Projects</button>
      <button class="pill">Studio</button>
      <button class="pill">Responsibility</button>
      <button class="pill">Archive</button>
      <button class="pill pill--lang">EN
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
    <button class="nav__burger" id="burger" aria-label="Menu">
      <svg id="burger-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      <svg id="burger-close" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </nav>

  <!-- Layer 7 — mobile dropdown -->
  <div class="mobile-menu" id="mobile-menu">
    <button>Projects</button>
    <button>Studio</button>
    <button>Responsibility</button>
    <button>Archive</button>
    <button>EN</button>
  </div>

  <!-- ════════ SECTION 1 — HERO ════════ -->
  <section class="hero" id="hero">
    <!-- Layer 1 -->
    <video class="hero__bg" autoplay muted loop playsinline
      src="https://plugin-assets.open-design.ai/plugins/layered-depth/bg-video_xsmysw-f9ba1c.mp4"></video>
    <!-- Layer 2 -->
    <div class="hero__overlay"></div>
    <!-- Layer 3 — bird system -->
    <div class="birds" id="birds" aria-hidden="true">
      <video id="bird-enter" muted playsinline
        src="https://plugin-assets.open-design.ai/plugins/layered-depth/bird-entrada_e72qt7-102269.webm"></video>
      <video id="bird-idle1" muted playsinline style="display:none"
        src="https://plugin-assets.open-design.ai/plugins/layered-depth/bird-idle_fzjami-a7d50b.webm"></video>
      <video id="bird-idle2" muted playsinline style="display:none"
        src="https://plugin-assets.open-design.ai/plugins/layered-depth/bird-idle2_rajmgo-a2bfbb.webm"></video>
      <video id="bird-leave" muted playsinline style="display:none"
        src="https://plugin-assets.open-design.ai/plugins/layered-depth/bird-saida_ifroz1-4ad3cb.webm"></video>
    </div>
    <!-- Layer 4 — brand text -->
    <div class="hero__brand"><span>Qelora</span></div>
    <!-- Layer 5 — sculpture slab -->
    <img class="hero__slab" id="slab" alt=""
      src="https://plugin-assets.open-design.ai/plugins/layered-depth/slab_v1_kb4vqk-eb36b8.webp">

    <!-- Layer 8 — bottom panels -->
    <div class="hero__panels" id="panels">
      <div class="panel-left">
        <div class="panel-left__head">Designing places
beyond
what's expected</div>
        <div class="panel-left__divider"></div>
        <a class="panel-left__link" href="#">Explore our approach
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </a>
      </div>
      <div class="panel-right">
        <img class="panel-right__bg" alt=""
          src="https://plugin-assets.open-design.ai/plugins/layered-depth/pexels-photo-3184465-a44809.webp">
        <div class="panel-right__grad"></div>
        <div class="panel-right__top">Every lasting space begins
with a quiet dialogue.</div>
        <div class="panel-right__cta">
          <span class="cta-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          </span>
          <button class="cta-btn">Start a project</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════ SECTION 2 ════════ -->
  <section class="sec2">
    <video class="sec2__bg" autoplay muted loop playsinline
      src="https://plugin-assets.open-design.ai/plugins/layered-depth/bg-2-video_sgbpqt-cdc7da.mp4"></video>
    <div class="sec2__overlay"></div>
    <div class="sec2__headline">
      <h2>What stands the<br>test of time is all<br>that guides the<br>work.</h2>
    </div>
    <div class="sec2__bottom">
      <div class="sec2__line"></div>
      <div class="sec2__info">
        <svg width="24" height="28" viewBox="0 0 24 28" fill="none" stroke="#2a2420" stroke-width="1.4">
          <path d="M12 26c5-6 8-10 8-15A8 8 0 0 0 4 11c0 5 3 9 8 15z"/>
          <circle cx="12" cy="11" r="3"/>
        </svg>
        <p>Civic bodies and private clients trust us to shape resilient communities and purposeful places.</p>
      </div>
    </div>
  </section>

  <script>
    // ── Layer 6/7 — mobile menu toggle ──
    (function () {
      var burger = document.getElementById('burger');
      var menu = document.getElementById('mobile-menu');
      var open = document.getElementById('burger-open');
      var close = document.getElementById('burger-close');
      if (!burger) return;
      burger.addEventListener('click', function () {
        var isOpen = menu.classList.toggle('open');
        open.style.display = isOpen ? 'none' : 'block';
        close.style.display = isOpen ? 'block' : 'none';
      });
    })();

    // ── Layer 5 + Layer 8 — scroll parallax ──
    // Sculpture moves UP with translateY(-scrollY * 0.3); panels push DOWN
    // with bottom = offset + scrollY * 0.5. useScroll/useTransform mapped to a
    // passive scroll listener writing inline transform/bottom.
    (function () {
      var slab = document.getElementById('slab');
      var panels = document.getElementById('panels');
      var isMobile = function () { return window.innerWidth < 768; };
      function onScroll() {
        var y = window.scrollY || window.pageYOffset;
        if (slab) slab.style.transform = 'translateX(-50%) translateY(' + (-y * 0.3) + 'px)';
        if (panels && !isMobile()) {
          panels.style.bottom = (36 + y * 0.5) + 'px';
        }
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();

    // ── Layer 3 — bird animation state machine ──
    // enter -> idle1 <-> idle2 (loop); scroll past 10px -> leave;
    // scroll back to top -> re-enter. State machine mapped from the React refs.
    (function () {
      var enter = document.getElementById('bird-enter');
      var idle1 = document.getElementById('bird-idle1');
      var idle2 = document.getElementById('bird-idle2');
      var leave = document.getElementById('bird-leave');
      if (!enter) return;
      var all = [enter, idle1, idle2, leave];
      var state = 'hidden';
      var stateRef = { v: 'hidden' };

      all.forEach(function (v) { try { v.load(); } catch (e) {} });

      function show(el) {
        all.forEach(function (v) { v.style.display = (v === el) ? 'block' : 'none'; });
      }
      function playVideo(el) {
        if (!el) return;
        try {
          el.currentTime = 0;
          if (el.readyState >= 2) {
            var p = el.play();
            if (p && p.catch) p.catch(function () {});
          } else {
            el.addEventListener('canplay', function once() {
              el.removeEventListener('canplay', once);
              var p = el.play();
              if (p && p.catch) p.catch(function () {});
            });
          }
        } catch (e) {}
      }
      function go(next) {
        state = next; stateRef.v = next;
        if (next === 'hidden') { show(null); return; }
        var map = { enter: enter, idle1: idle1, idle2: idle2, leave: leave };
        show(map[next]);
        playVideo(map[next]);
      }

      enter.addEventListener('ended', function () { if (stateRef.v === 'enter') go('idle1'); });
      idle1.addEventListener('ended', function () { if (stateRef.v === 'idle1') go('idle2'); });
      idle2.addEventListener('ended', function () { if (stateRef.v === 'idle2') go('idle1'); });

      // kick off enter on load
      go('enter');

      var THRESH = 10;
      window.addEventListener('scroll', function () {
        var y = window.scrollY || window.pageYOffset;
        if (y > THRESH) {
          if (stateRef.v !== 'leave') {
            [enter, idle1, idle2].forEach(function (v) { try { v.pause(); v.currentTime = 0; } catch (e) {} });
            go('leave');
          }
        } else {
          if (stateRef.v === 'leave') {
            try { leave.pause(); leave.currentTime = 0; } catch (e) {}
            go('enter');
          }
        }
      }, { passive: true });
    })();
  </script>
</body>
</html>
