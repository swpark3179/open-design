<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shamoni — Master the Elements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-serif: "Instrument Serif", serif;
      --font-sans: "Manrope", sans-serif;
      --font-script: "Great Vibes", cursive;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; }
    body { font-family: var(--font-sans); color: #fff; }

    /* ── Scroll spacer: 600vh tall, sticky stage on top ── */
    .scroll-root { position: relative; width: 100%; height: 600vh; background: #000; }
    .sticky-stage {
      position: sticky; top: 0; width: 100%; height: 100vh;
      overflow: hidden; color: #fff;
    }

    /* ── Background video ── */
    #bg-video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    .bg-tint { position: absolute; inset: 0; background: rgba(0,0,0,0.10); z-index: 0; }

    /* ── Brand wordmark (bottom-left, on video) ── */
    .brand-mark {
      position: absolute; z-index: 10; width: 80vw;
      left: 3vw; bottom: 3vw;
    }
    .brand-mark svg { width: 100%; height: auto; overflow: visible; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.45)); }

    /* ── Expanding ellipse mask layer ── */
    .mask-layer {
      position: absolute; z-index: 20;
      width: 150vw; height: 150vh; left: -25vw; top: -25vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      transform: rotate(-15deg);
      /* clip-path animated via JS: ellipse(rx ry at 50% 50%) */
      clip-path: ellipse(0% 0% at 50% 50%);
      will-change: clip-path;
    }
    .mask-white { position: absolute; inset: 0; background: #fff; }
    .mask-inner {
      position: relative; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100vw; height: 100vh; transform: rotate(15deg);
    }
    .orbit-stage {
      width: 90vw; max-width: 1200px; aspect-ratio: 1 / 1; position: relative; z-index: 0;
    }

    /* ── Orbit gallery ── */
    .orbit-container { position: relative; margin: 0 auto; width: 100%; height: 100%; }
    .orbit-scaling { position: absolute; left: 50%; top: 50%; transform-origin: center center; }
    .orbit-rotation-wrapper { width: 100%; height: 100%; transform-origin: center center; position: relative; will-change: transform; }
    .orbit-item {
      position: absolute; will-change: transform; user-select: none;
      offset-rotate: 0deg; offset-anchor: center center;
    }
    .orbit-image {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
      cursor: pointer; pointer-events: auto; transition: filter 0.3s ease;
      background: #e7e2d8;
    }
    .orbit-image:hover { filter: brightness(1.05); }

    /* ── Overlay text layer (above mask) ── */
    .overlay { position: absolute; inset: 0; z-index: 60; pointer-events: none; }

    .center-text {
      position: absolute; top: 48%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50; pointer-events: none;
    }
    .center-inner {
      display: flex; flex-direction: column; align-items: center;
      white-space: nowrap; pointer-events: auto;
      -webkit-font-smoothing: antialiased; transform: translateZ(0);
      will-change: opacity, filter;
    }
    .center-line { display: flex; align-items: baseline; color: #000; line-height: 1; margin-bottom: 4px; }
    .center-line .ital { font-family: var(--font-serif); font-style: italic; font-size: 55px; letter-spacing: -0.02em; color: #000; }
    .center-line .reg  { font-family: var(--font-serif); font-size: 55px; letter-spacing: -0.02em; color: #000; }
    .center-embrace { font-family: var(--font-sans); font-size: 36px; letter-spacing: -0.02em; color: #000; margin-top: -5px; }

    .corner { position: absolute; display: flex; flex-direction: column; pointer-events: auto; will-change: opacity, filter, transform; }
    .corner .big { font-family: var(--font-serif); font-size: 40px; line-height: 1; color: #000; }
    .corner .small { font-family: var(--font-serif); font-size: 16px; text-transform: uppercase; letter-spacing: 0.18em; color: #000; line-height: 20px; }

    .corner-tr { top: 128px; right: 214px; align-items: flex-start; text-align: left; }
    .corner-tr .big { margin-bottom: 12px; }

    .corner-bl { bottom: 64px; left: 64px; align-items: flex-start; }
    .corner-bl .big { margin-bottom: 4px; }

    .corner-br { bottom: 64px; right: 10vw; align-items: flex-start; z-index: 10; }
    .corner-br p {
      font-family: var(--font-serif); font-size: 16px; text-transform: uppercase;
      letter-spacing: 0.18em; color: #000; line-height: 20px; margin-bottom: 24px;
      width: 240px; text-align: left;
    }
    .cta-row { display: flex; align-items: center; pointer-events: auto; }
    .cta-btn {
      background: #000; color: #fff; border: none; cursor: pointer;
      border-radius: 40px; padding: 14px 32px;
      font-family: var(--font-serif); letter-spacing: 0.1em; text-transform: uppercase; font-size: 14px;
      z-index: 10; transition: background 0.2s ease;
    }
    .cta-btn:hover { background: #1a1a1a; }
    .cta-arrow {
      background: #000; color: #fff; border: none; cursor: pointer;
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-left: -8px; z-index: 0; transition: background 0.2s ease;
    }
    .cta-arrow:hover { background: #1a1a1a; }
    .cta-arrow svg { margin-left: 4px; }

    /* ── Fixed header ── */
    .site-header {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 40px; display: flex; justify-content: space-between; align-items: flex-start;
      z-index: 100; pointer-events: none; will-change: opacity, filter;
    }
    .header-brand {
      display: flex; align-items: flex-start; color: #000; line-height: 1;
      pointer-events: auto; font-family: var(--font-serif);
      -webkit-font-smoothing: antialiased;
    }
    .header-brand .name { font-size: 40px; }
    .header-brand .copy { font-size: 14px; margin-left: 4px; margin-top: 4px; }
    .menu-btn {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: 72px; height: 44px; cursor: pointer; pointer-events: auto;
      background: none; border: none; transition: transform 0.3s ease;
    }
    .menu-btn:hover { transform: scale(1.05); }
    .menu-btn .pill { position: absolute; inset: 0; background: #000; border-radius: 50%; transform: rotate(-15deg); }
    .menu-btn svg { position: relative; z-index: 10; }

    @media (max-width: 768px) {
      .brand-mark { width: 92vw; }
      .center-line .ital, .center-line .reg { font-size: 45px; }
      .center-embrace { font-size: 28px; }
      .corner-tr { right: calc(6vw + 30px); top: 96px; }
      .corner-bl { left: 24px; bottom: 32px; }
      .corner-br { right: 6vw; bottom: 40px; }
      .corner-br p { width: 200px; }
      .site-header { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="scroll-root" id="scrollRoot">
    <div class="sticky-stage">

      <!-- Background video -->
      <video id="bg-video" autoplay loop muted playsinline>
        <source src="https://plugin-assets.open-design.ai/plugins/luxury-botanical/hf_20260520_114550_b72cc2b7-2267-4d9e-b19f-f3bb4b0c7084-e5c560.mp4" type="video/mp4" />
      </video>
      <div class="bg-tint"></div>

      <!-- Brand wordmark on video -->
      <div class="brand-mark">
        <svg viewBox="0 10 350 72" preserveAspectRatio="xMinYMax meet">
          <text x="-3" y="80" font-family="'Instrument Serif', serif" fill="#FDFFB7">
            <tspan font-size="90">Shamoni</tspan>
            <tspan font-size="28.8" dx="4" dy="-40">©</tspan>
          </text>
        </svg>
      </div>

      <!-- Expanding ellipse mask reveals the white scene + orbit gallery -->
      <div class="mask-layer" id="maskLayer">
        <div class="mask-white"></div>
        <div class="mask-inner">
          <div class="orbit-stage">
            <div class="orbit-container" id="orbitContainer">
              <div class="orbit-scaling" id="orbitScaling">
                <div class="orbit-rotation-wrapper" id="orbitRotation">
                  <!-- orbit items injected by JS -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Overlay text -->
      <div class="overlay">
        <div class="center-text">
          <div class="center-inner" id="centerText">
            <div class="center-line">
              <span class="ital">M</span><span class="reg">aster the Elements</span>
            </div>
            <span class="center-embrace">embrace</span>
          </div>
        </div>

        <div class="corner corner-tr fade-el">
          <span class="big">2K26</span>
          <span class="small">JOIN AN EXCLUSIVE<br />COMMUNITY</span>
        </div>

        <div class="corner corner-bl fade-el">
          <span class="big">0651</span>
          <span class="small">COLLECTION</span>
        </div>

        <div class="corner corner-br">
          <p class="fade-el">JOIN AN EXCLUSIVE COMMUNITY OF SAILORS. WHETHER YOU CRAVE THE THRILL OF THE OPEN</p>
          <div class="cta-row fade-el">
            <button class="cta-btn">BUY COLLECTION</button>
            <button class="cta-arrow" aria-label="Go">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Fixed header -->
      <header class="site-header" id="siteHeader">
        <div class="header-brand">
          <span class="name">Shamoni</span>
          <span class="copy">©</span>
        </div>
        <button class="menu-btn" aria-label="Menu">
          <span class="pill"></span>
          <svg width="24" height="10" viewBox="0 0 24 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1H23M1 9H23" stroke="white" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </header>

    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────────────────
    // Shamoni — vanilla scroll-driven port of the Framer Motion spec.
    // scrollYProgress (0..1) maps to: ellipse clip-path reveal, orbit
    // radius/itemSize/rotation/translateX expansion, masked-text fade,
    // and a continuously-advancing orbit progress driven by scroll velocity.
    // ────────────────────────────────────────────────────────────

    var BASE = 800;                 // baseWidth (design space)
    var CENTER = BASE / 2;          // 400
    var TARGET_RADIUS = 650;

    var orbitImages = [
      "https://plugin-assets.open-design.ai/plugins/shamoni/202604232047_gxyqne-fe20b7.webp",
      "https://plugin-assets.open-design.ai/plugins/shamoni/202604232052_ihyslg-a296bf.webp",
      "https://plugin-assets.open-design.ai/plugins/shamoni/15112343_tuzrbg-2d4248.webp",
      "https://plugin-assets.open-design.ai/plugins/shamoni/202604232043_vhb6u9-eba8d1.webp",
      "https://plugin-assets.open-design.ai/plugins/shamoni/02604232058_nh1qd1-581ce1.webp",
      "https://plugin-assets.open-design.ai/plugins/shamoni/202604232105_lv3fhp-03d3b8.webp"
    ];

    // ── linear interpolation across keyframe arrays (Framer useTransform) ──
    function interp(t, inputs, outputs) {
      if (t <= inputs[0]) return outputs[0];
      if (t >= inputs[inputs.length - 1]) return outputs[outputs.length - 1];
      for (var i = 0; i < inputs.length - 1; i++) {
        if (t >= inputs[i] && t <= inputs[i + 1]) {
          var span = inputs[i + 1] - inputs[i];
          var f = span === 0 ? 0 : (t - inputs[i]) / span;
          return outputs[i] + (outputs[i + 1] - outputs[i]) * f;
        }
      }
      return outputs[outputs.length - 1];
    }

    // ── path generators ──
    function ellipsePath(cx, cy, rx, ry) {
      return "M " + (cx - rx) + " " + cy + " A " + rx + " " + ry + " 0 1 0 " + (cx + rx) + " " + cy +
             " A " + rx + " " + ry + " 0 1 0 " + (cx - rx) + " " + cy;
    }

    // ── build orbit items (offset-path based, fill: even distribution) ──
    var rotationWrapper = document.getElementById('orbitRotation');
    var items = [];
    var N = orbitImages.length;
    for (var i = 0; i < N; i++) {
      var el = document.createElement('div');
      el.className = 'orbit-item';
      var img = document.createElement('img');
      img.className = 'orbit-image';
      img.src = orbitImages[i];
      img.alt = 'Orbiting image ' + (i + 1);
      img.draggable = false;
      el.appendChild(img);
      rotationWrapper.appendChild(el);
      items.push({ el: el, offset: (i / N) * 100 });
    }

    // ── focal scale curve (matches OrbitItem itemScale) ──
    function itemScaleFor(rawPos, strength) {
      var dist = Math.abs(rawPos - 50);
      if (dist > 50) dist = 100 - dist;
      var target;
      if (dist < 20) {
        var ratio = dist / 20;
        var cosCurve = (Math.cos(ratio * Math.PI) + 1) / 2;
        target = 0.4 + cosCurve * 0.6;
      } else {
        target = 0.4;
      }
      return 1 - strength * (1 - target);
    }

    // ── responsive scale of design space into the stage ──
    var orbitContainer = document.getElementById('orbitContainer');
    var orbitScaling = document.getElementById('orbitScaling');
    var stageScale = 1;
    function updateStageScale() {
      var w = orbitContainer.clientWidth || 1;
      stageScale = w / BASE;
      orbitScaling.style.width = BASE + 'px';
      orbitScaling.style.height = BASE + 'px';
    }
    updateStageScale();
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(updateStageScale).observe(orbitContainer);
    } else {
      window.addEventListener('resize', updateStageScale);
    }

    // ── elements ──
    var maskLayer = document.getElementById('maskLayer');
    var rotation = document.getElementById('orbitRotation');
    var centerText = document.getElementById('centerText');
    var siteHeader = document.getElementById('siteHeader');
    var fadeEls = Array.prototype.slice.call(document.querySelectorAll('.fade-el'));
    var scrollRoot = document.getElementById('scrollRoot');

    // ── continuously advancing orbit progress (scroll-velocity driven) ──
    var orbitProgress = 0;
    var prevScroll = 0;

    function getProgress() {
      var rect = scrollRoot.getBoundingClientRect();
      var total = scrollRoot.offsetHeight - window.innerHeight;
      if (total <= 0) return 0;
      var p = (-rect.top) / total;
      return Math.min(1, Math.max(0, p));
    }

    function render() {
      var p = getProgress();

      // velocity-based orbit advance (useAnimationFrame analogue)
      var scrollDelta = p - prevScroll;
      prevScroll = p;
      var frameSpeed;
      if (p > 0.15 && p < 0.85) {
        frameSpeed = scrollDelta * 200;
      } else {
        frameSpeed = (1 / 60) * 2.5; // idle drift
      }
      orbitProgress += frameSpeed;

      // 1) ellipse clip-path reveal
      var rx = interp(p, [0, 0.08, 1], [0, 55, 55]);
      var ry = interp(p, [0, 0.08, 1], [0, 55, 55]);
      maskLayer.style.clipPath = 'ellipse(' + rx + '% ' + ry + '% at 50% 50%)';
      maskLayer.style.webkitClipPath = 'ellipse(' + rx + '% ' + ry + '% at 50% 50%)';

      // 2) masked text + corner fade timeline
      var textOpacity = interp(p, [0.03, 0.08, 0.15, 0.22, 0.90, 0.98, 1], [0, 1, 1, 0, 0, 1, 1]);
      var textBlur = interp(p, [0.03, 0.08, 0.15, 0.22, 0.90, 0.98, 1], [15, 0, 0, 15, 15, 0, 0]);
      var yEl = interp(p, [0.03, 0.08, 0.15, 0.22, 0.90, 0.98, 1], [20, 0, 0, 20, 20, 0, 0]);

      centerText.style.opacity = textOpacity;
      centerText.style.filter = 'blur(' + textBlur + 'px)';
      siteHeader.style.opacity = textOpacity;
      siteHeader.style.filter = 'blur(' + textBlur + 'px)';
      for (var k = 0; k < fadeEls.length; k++) {
        fadeEls[k].style.opacity = textOpacity;
        fadeEls[k].style.filter = 'blur(' + textBlur + 'px)';
        fadeEls[k].style.transform = 'translateY(' + yEl + 'px)';
      }

      // 3) orbit expansion timeline
      var itemSize = interp(p, [0.15, 0.25, 0.85, 0.95, 1], [80, 520, 520, 80, 80]);
      var orx = interp(p, [0.15, 0.25, 0.85, 0.95, 1], [330, TARGET_RADIUS, TARGET_RADIUS, 330, 330]);
      var ory = interp(p, [0.15, 0.25, 0.85, 0.95, 1], [140, TARGET_RADIUS, TARGET_RADIUS, 140, 140]);
      var orot = interp(p, [0.15, 0.25, 0.85, 0.95, 1], [-15, 0, 0, -15, -15]);
      var otx = interp(p, [0.15, 0.25, 0.85, 0.95, 1], [0, -TARGET_RADIUS, -TARGET_RADIUS, 0, 0]);
      var focusStrength = interp(p, [0.15, 0.25, 0.85, 0.95, 1], [0, 1, 1, 0, 0]);

      // responsive scaling wrapper transform
      orbitScaling.style.transform = 'translate(-50%, -50%) scale(' + stageScale + ')';
      // rotation wrapper: rotate + translateX
      rotation.style.transform = 'rotate(' + orot + 'deg) translateX(' + otx + 'px)';

      var d = ellipsePath(CENTER, CENTER, orx, ory);

      // place each orbit item along the path via offset-distance
      for (var j = 0; j < items.length; j++) {
        var it = items[j];
        var rawPos = (((orbitProgress + it.offset) % 100) + 100) % 100;
        var sc = itemScaleFor(rawPos, focusStrength);
        var inner = it.el.firstChild;
        it.el.style.width = itemSize + 'px';
        it.el.style.height = itemSize + 'px';
        it.el.style.offsetPath = 'path("' + d + '")';
        it.el.style.webkitOffsetPath = 'path("' + d + '")';
        it.el.style.offsetDistance = rawPos + '%';
        it.el.style.webkitOffsetDistance = rawPos + '%';
        it.el.style.transform = 'scale(' + sc + ')';
        it.el.style.zIndex = Math.round(sc * 100);
        // counter-rotate image so it stays upright
        inner.style.transform = 'rotate(' + (-orot) + 'deg)';
      }

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
